name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prepare:
    uses: ./.github/workflows/_prep.yml
    permissions:
      contents: write  # needed to push the git tag

  build-push:
    needs: prepare
    uses: ./.github/workflows/_build-push.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit
    permissions:
      packages: write         # push to GHCR
      security-events: write  # upload Trivy SARIF to GitHub Security tab
