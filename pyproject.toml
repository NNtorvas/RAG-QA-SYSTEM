[tool.black]
line-length = 110
skip_string_normalization = true

[tool.flake8]
max-line-length = 110
extend-ignore = ["E203", "W503", "W504"]
exclude = ["__pycache__", ".git", "chroma_db", "uploads", ".venv", "venv"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["backend"]
addopts = "--tb=short"
